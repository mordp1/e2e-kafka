# ─────────────────────────────────────────────────────────────────────────────
# Aiven for Apache Kafka — mTLS (default) or SASL/SCRAM
# ─────────────────────────────────────────────────────────────────────────────
# Aiven uses mTLS by default. Download the access files from the Aiven console:
#   Service → Overview → Connection information → Advanced parameters
#   Files needed: ca.pem, service.cert, service.key
#
# Convert PEM files to JKS (required by the Java Kafka client):
#
#   # Truststore (broker CA)
#   keytool -keystore client.truststore.jks -alias CARoot \
#     -import -file ca.pem -storepass <TRUSTSTORE_PASSWORD> -noprompt
#
#   # Keystore (client cert + key)
#   openssl pkcs12 -export \
#     -in service.cert -inkey service.key \
#     -out client.p12 -name aiven-client -passout pass:<KEYSTORE_PASSWORD>
#   keytool -importkeystore \
#     -srckeystore client.p12 -srcstoretype PKCS12 -srcstorepass <KEYSTORE_PASSWORD> \
#     -destkeystore client.keystore.jks -deststorepass <KEYSTORE_PASSWORD>
#
# Bootstrap URL: <service>-<project>.aivencloud.com:<PORT>
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=<SERVICE>-<PROJECT>.aivencloud.com:<PORT>

security.protocol=SSL

ssl.truststore.location=/app/secrets/client.truststore.jks
ssl.truststore.password=<TRUSTSTORE_PASSWORD>

ssl.keystore.location=/app/secrets/client.keystore.jks
ssl.keystore.password=<KEYSTORE_PASSWORD>
ssl.key.password=<KEY_PASSWORD>
