# ─────────────────────────────────────────────────────────────────────────────
# mTLS — mutual TLS (client + server authentication)
# ─────────────────────────────────────────────────────────────────────────────
# Both sides verify each other's certificates.
# Broker requires a client certificate; client requires a valid broker cert.
#
# How to generate client keystore + truststore:
#
#   # 1. Create client key and certificate signed by the CA
#   openssl req -newkey rsa:2048 -nodes -keyout client.key \
#     -out client.csr -subj "/CN=e2e-kafka-client"
#   openssl x509 -req -CA ca-cert.pem -CAkey ca-key.pem \
#     -in client.csr -out client-cert.pem -days 365 -CAcreateserial
#
#   # 2. Bundle key + cert into a PKCS12 keystore, then convert to JKS
#   openssl pkcs12 -export -in client-cert.pem -inkey client.key \
#     -out client.p12 -name client -passout pass:<KEYSTORE_PASSWORD>
#   keytool -importkeystore \
#     -srckeystore client.p12 -srcstoretype PKCS12 -srcstorepass <KEYSTORE_PASSWORD> \
#     -destkeystore client.keystore.jks -deststorepass <KEYSTORE_PASSWORD>
#
#   # 3. Import broker CA into truststore
#   keytool -keystore client.truststore.jks -alias CARoot \
#     -import -file ca-cert.pem -storepass <TRUSTSTORE_PASSWORD>
#
# Mount both JKS files into the container and set the paths below.
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=broker.example.com:9093

security.protocol=SSL

# Truststore — CA that signed the broker certificate
ssl.truststore.location=/app/secrets/client.truststore.jks
ssl.truststore.password=<TRUSTSTORE_PASSWORD>

# Keystore — client certificate + private key presented to the broker
ssl.keystore.location=/app/secrets/client.keystore.jks
ssl.keystore.password=<KEYSTORE_PASSWORD>
ssl.key.password=<KEY_PASSWORD>
