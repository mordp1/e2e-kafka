# ─────────────────────────────────────────────────────────────────────────────
# GCP Managed Kafka — OAUTHBEARER via Application Default Credentials
# ─────────────────────────────────────────────────────────────────────────────
# GCP Managed Service for Apache Kafka uses OAuth 2.0 tokens issued by Google.
# The GcpLoginCallbackHandler fetches a token from ADC automatically.
#
# Prerequisites:
#   1. Enable the Managed Kafka API in your GCP project.
#   2. Grant the service account / user the "Managed Kafka Client" role.
#   3. Provide credentials via one of:
#      a) Service account JSON:
#           export GOOGLE_APPLICATION_CREDENTIALS=/path/to/sa.json
#      b) gcloud ADC (local dev):
#           gcloud auth application-default login
#
# Bootstrap URL format:
#   bootstrap.<CLUSTER_ID>.<REGION>.managedkafka.<PROJECT_ID>.cloud.goog:9092
#
# Reference:
#   https://cloud.google.com/managed-service-for-apache-kafka/docs/quickstart-java
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=bootstrap.<CLUSTER_ID>.<REGION>.managedkafka.<PROJECT_ID>.cloud.goog:9092

security.protocol=SASL_SSL
sasl.mechanism=OAUTHBEARER
sasl.login.callback.handler.class=com.google.cloud.hosted.kafka.auth.GcpLoginCallbackHandler
sasl.jaas.config=org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required;
