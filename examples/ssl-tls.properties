# ─────────────────────────────────────────────────────────────────────────────
# SSL / TLS — one-way TLS (server authentication only, no client cert)
# ─────────────────────────────────────────────────────────────────────────────
# The client verifies the broker's certificate.
# The broker does NOT verify the client.
#
# How to generate a truststore for the broker CA:
#   keytool -keystore client.truststore.jks -alias CARoot \
#     -import -file ca-cert.pem -storepass <TRUSTSTORE_PASSWORD>
#
# Mount the JKS file into the container and set the path below.
# Run example:
#   CONFIG=/path/to/ssl-tls.properties \
#   SSL_TRUSTSTORE=/path/to/client.truststore.jks \
#   ./run-docker.sh
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=broker.example.com:9093

security.protocol=SSL

# Truststore — contains the CA certificate that signed the broker's certificate
ssl.truststore.location=/app/secrets/client.truststore.jks
ssl.truststore.password=<TRUSTSTORE_PASSWORD>

# Optional: disable hostname verification (NOT recommended for production)
# ssl.endpoint.identification.algorithm=
