# ─────────────────────────────────────────────────────────────────────────────
# SASL/SCRAM-SHA-256 over TLS
# ─────────────────────────────────────────────────────────────────────────────
# Common with: self-managed Kafka, Aiven, Redpanda, Confluent Platform.
#
# Broker-side setup (one-time, Kafka 3.x+):
#   kafka-configs.sh --bootstrap-server localhost:9092 \
#     --alter --add-config 'SCRAM-SHA-256=[iterations=8192,password=<PASSWORD>]' \
#     --entity-type users --entity-name <USERNAME>
#
# The password below is embedded in the JAAS config.
# For production prefer reading it from an environment variable or a secrets
# manager and passing it at container start-up instead of committing the file.
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=broker.example.com:9092

security.protocol=SASL_SSL
sasl.mechanism=SCRAM-SHA-256

sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="<USERNAME>" \
  password="<PASSWORD>";

# Truststore — CA that signed the broker certificate
ssl.truststore.location=/app/secrets/client.truststore.jks
ssl.truststore.password=<TRUSTSTORE_PASSWORD>
