# ─────────────────────────────────────────────────────────────────────────────
# Confluent Cloud — SASL/PLAIN over TLS
# ─────────────────────────────────────────────────────────────────────────────
# Uses a Confluent Cloud API Key (username) + API Secret (password).
#
# How to get credentials:
#   Confluent Cloud console → your cluster → API Keys → + Add key
#   Or: confluent api-key create --resource <CLUSTER_ID>
#
# Bootstrap URL:
#   Cluster overview → Cluster settings → Bootstrap server
#   Format: pkc-<id>.<region>.<cloud>.confluent.cloud:9092
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=pkc-<ID>.<REGION>.<CLOUD>.confluent.cloud:9092

security.protocol=SASL_SSL
sasl.mechanism=PLAIN

sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="<API_KEY>" \
  password="<API_SECRET>";

# Confluent Cloud uses a public CA cert — no custom truststore needed
ssl.endpoint.identification.algorithm=https
