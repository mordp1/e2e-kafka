# ─────────────────────────────────────────────────────────────────────────────
# SASL/PLAIN over TLS
# ─────────────────────────────────────────────────────────────────────────────
# Username + password sent in plaintext INSIDE the TLS-encrypted channel.
# Common with: Confluent Cloud, Azure Event Hubs for Kafka, Redpanda Cloud.
#
# Confluent Cloud specific values:
#   bootstrap.servers=pkc-<id>.<region>.confluent.cloud:9092
#   username = API Key
#   password = API Secret
#
# Azure Event Hubs specific values:
#   bootstrap.servers=<namespace>.servicebus.windows.net:9093
#   username = $ConnectionString
#   password = Endpoint=sb://<namespace>...;SharedAccessKeyName=...;SharedAccessKey=...
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=broker.example.com:9092

security.protocol=SASL_SSL
sasl.mechanism=PLAIN

sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required \
  username="<USERNAME>" \
  password="<PASSWORD>";

# Truststore — omit (or leave commented) if the broker uses a public CA cert
# ssl.truststore.location=/app/secrets/client.truststore.jks
# ssl.truststore.password=<TRUSTSTORE_PASSWORD>
