# ─────────────────────────────────────────────────────────────────────────────
# Amazon MSK — SASL/SCRAM-SHA-512 (Secrets Manager)
# ─────────────────────────────────────────────────────────────────────────────
# MSK supports SCRAM-SHA-512 credentials stored in AWS Secrets Manager.
#
# MSK setup (one-time via AWS console or CLI):
#   1. Create a secret in Secrets Manager named AmazonMSK_<cluster>
#      with keys "username" and "password".
#   2. Associate the secret with the MSK cluster (Authentication tab).
#   3. Grant the MSK cluster's IAM role access to the secret.
#
# The client uses the username/password directly — no AWS SDK needed at runtime.
#
# Retrieve credentials before running:
#   aws secretsmanager get-secret-value --secret-id AmazonMSK_<cluster> \
#     --query SecretString --output text
# ─────────────────────────────────────────────────────────────────────────────

bootstrap.servers=<BROKER_1>:9096,<BROKER_2>:9096,<BROKER_3>:9096

security.protocol=SASL_SSL
sasl.mechanism=SCRAM-SHA-512

sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required \
  username="<USERNAME>" \
  password="<PASSWORD>";

# MSK uses AWS-managed TLS certificates (public CA) — no custom truststore needed
