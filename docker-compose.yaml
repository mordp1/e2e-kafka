services:
  # Source Kafka Cluster
  kafka-source:
    image: apache/kafka:3.7.1
    hostname: kafka-source
    container_name: kafka-source
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka-source:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-source:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka-source:29092,CONTROLLER://kafka-source:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafbat-ui:
    container_name: kafbat-ui
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - 8090:8080
    environment:
      KAFKA_CLUSTERS_0_NAME: kafka-source
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-source:29092
    depends_on:
      kafka-source:
        condition: service_healthy

  # E2E latency test — builds from the local Dockerfile and runs against kafka-source.
  # Reports (JSON + HTML) are written to ./out/ on the host.
  # Adjust NUM_MESSAGES / TOPIC as needed.
  e2e-kafka:
    build:
      context: .
    container_name: e2e-kafka
    depends_on:
      kafka-source:
        condition: service_healthy
    volumes:
      - ./kafka-client.properties.local:/app/config/kafka-client.properties:ro
      - ./out:/app/out
    command:
      - "--kafkaProps"
      - "/app/config/kafka-client.properties"
      - "--topic"
      - "invoice-topic"
      - "--groupId"
      - "e2e-latency"
      # batch mode: sends --numMessages total as fast as possible
      # continuous mode: sends --ratePerSecond msg/s for --durationSeconds seconds
      - "--mode"
      - "batch"           # change to: continuous
      - "--numMessages"
      - "1000"            # batch mode only; ignored in continuous mode
      - "--ratePerSecond"
      - "500"             # continuous mode only (msg/s)
      - "--durationSeconds"
      - "60"              # continuous mode only (seconds)
      # Message schema: invoice | payment | order
      - "--messageType"
      - "invoice"
      # Key strategy: messageId (default) | entityId | none
      - "--keyStrategy"
      - "messageId"
      - "--sampleEverySeconds"
      - "1"
      - "--outputDir"
      - "/app/out"
